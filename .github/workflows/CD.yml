name: CD - Release Submissions

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline scripts main.py
        run: |
          python -u main.py

      - name: Package submissions
        run: |
          if [ ! -d submissions ]; then
            echo "submissions folder not found"
            exit 1
          fi
          zip -r submissions.zip submissions

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Data-Storm Release ${{ github.ref_name }}"
          body: |
            Automated release for ${{ github.ref_name }}.
            Commit: ${{ github.sha }}
          files: submissions.zip
