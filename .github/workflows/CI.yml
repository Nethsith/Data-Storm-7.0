name: CI - Data-Storm Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Cache 1: pip packages ──────────────────────────────────────────
      # Key includes requirements.txt hash so the cache is invalidated
      # whenever dependencies change.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Cache 2: WorldPop GeoTIFF rasters ─────────────────────────────
      # These rarely change (historical data). A static key keeps them
      # across every run without re-downloading ~10 MB per year file.
      - name: Cache WorldPop rasters
        uses: actions/cache@v4
        with:
          path: worldpop_rasters/
          key: worldpop-rasters-v1

      # ── Cache 3: API checkpoints (pop_YYYY.parquet) ────────────────────
      # Keyed on 6.API.py content so any script change busts the cache.
      # restore-keys prefix lets us reuse a partial cache even after edits.
      - name: Cache API checkpoints
        uses: actions/cache@v4
        with:
          path: checkpoints/
          key: api-checkpoints-${{ hashFiles('scripts/6.API.py') }}
          restore-keys: |
            api-checkpoints-

      # ── Pipeline ───────────────────────────────────────────────────────
      - name: Download Kaggle raw data
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python -u scripts/0.getting_raw_data.py

      - name: Read Data
        run: python -u scripts/1.read_data.py

      - name: Missing Value Imputation
        run: python -u scripts/2.miss_val.py

      - name: Silver Data
        run: python -u scripts/3.silver_data.py

      - name: Outlet Size Imputation
        run: python -u scripts/5.outlet_size_imputation.py

      - name: Holiday Data
        run: python -u scripts/7.holiday.py

      # 6.API.py reads checkpoints/ and skips years already extracted.
      # On a cache hit this step is nearly instant.
      - name: API — Population Density (checkpoint-aware)
        run: python -u scripts/6.API.py

      - name: Gold Data
        run: python -u scripts/8.gold_data.py

      - name: Model
        run: python -u scripts/9.model.py

      # ── Upload artifacts for CD ────────────────────────────────────────
      # Only on real pushes to main (not PRs) so CD can download them.
      # Keyed by commit SHA so CD can find the exact matching run.
      - name: Upload pipeline artifacts for CD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ github.sha }}
          path: |
            processed/
            checkpoints/
          retention-days: 7
